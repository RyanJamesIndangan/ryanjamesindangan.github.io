<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Warm clay orb (Anthropic "Claude" terracotta) -->
    <radialGradient id="orbGradient" cx="32%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#E8A283"/>
      <stop offset="45%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#BD5D3A"/>
    </radialGradient>
    <radialGradient id="highlight" cx="28%" cy="24%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Clay orb -->
  <circle cx="32" cy="32" r="30" fill="url(#orbGradient)"/>
  <circle cx="32" cy="32" r="30" fill="url(#highlight)"/>

  <!-- Anthropic spark / four-pointed star in warm ivory -->
  <path d="M32 13
           C 33.4 26.0, 38.0 30.6, 51 32
           C 38.0 33.4, 33.4 38.0, 32 51
           C 30.6 38.0, 26.0 33.4, 13 32
           C 26.0 30.6, 30.6 26.0, 32 13 Z"
        fill="#FAF9F5"/>
</svg>
