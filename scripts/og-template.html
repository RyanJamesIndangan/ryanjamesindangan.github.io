<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    background:
      radial-gradient(1200px 720px at 82% -12%, #FBF6EE 0%, transparent 60%),
      linear-gradient(160deg, #FAF9F5 0%, #F3F1E9 55%, #ECE8DC 100%);
    color: #141413; position: relative;
  }
  /* faint warm paper grain via dotted oat overlay */
  .grain { position: absolute; inset: 0;
    background-image: radial-gradient(rgba(120,100,80,0.05) 1px, transparent 1px);
    background-size: 22px 22px; mask: radial-gradient(900px 600px at 35% 50%, #000 50%, transparent 100%); }
  .wrap { position: relative; z-index: 2; height: 100%; display: flex; align-items: center; padding: 0 80px; gap: 52px; }
  .photo { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; flex: none;
    border: 4px solid #FFFFFF; box-shadow: 0 12px 36px rgba(60,50,40,0.18); }
  .info { max-width: 640px; }
  .eyebrow { display: flex; align-items: center; gap: 10px; font-size: 17px; letter-spacing: 3px;
    text-transform: uppercase; color: #BD5D3A; font-weight: 700; margin-bottom: 14px; }
  .spark { width: 22px; height: 22px; }
  h1 { font-family: 'Fraunces', Georgia, serif; font-size: 64px; font-weight: 600; line-height: 1.02;
    letter-spacing: -1.5px; color: #141413; }
  h1 .hl { background: linear-gradient(180deg, transparent 62%, rgba(217,119,87,0.32) 62%); padding: 0 2px; }
  h2 { font-size: 26px; font-weight: 500; color: #5C5A53; margin-top: 16px; line-height: 1.35; }
  .tags { margin-top: 28px; display: flex; flex-wrap: wrap; gap: 10px; }
  .tag { font-size: 16px; font-weight: 600; padding: 8px 16px; border-radius: 999px;
    background: #FFFFFF; border: 1px solid #DAD9D2; color: #3D3D3A; }
  .tag.accent { background: #D97757; border-color: #D97757; color: #FAF9F5; }
  .url { position: absolute; left: 80px; bottom: 44px; z-index: 3; font-size: 19px; font-weight: 700; color: #8a4f38; }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="wrap">
    <img class="photo" src="../assets/profile-photo.jpg" alt="">
    <div class="info">
      <div class="eyebrow">
        <svg class="spark" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 C 12.6 9.4, 14.6 11.4, 22 12 C 14.6 12.6, 12.6 14.6, 12 22 C 11.4 14.6, 9.4 12.6, 2 12 C 9.4 11.4, 11.4 9.4, 12 2 Z" fill="#D97757"/></svg>
        Portfolio
      </div>
      <h1>Ryan James<br>Indangan</h1>
      <h2>AI Software Engineer &amp; <span class="hl">Full-Stack Developer</span></h2>
      <div class="tags">
        <span class="tag accent">AI / ML</span>
        <span class="tag">Document Intelligence</span>
        <span class="tag">OCR</span>
        <span class="tag">LLM Integration</span>
      </div>
    </div>
  </div>
  <div class="url">ryanjamesindangan.github.io</div>
</body>
</html>
